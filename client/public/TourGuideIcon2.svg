<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Rounded Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>

  <!-- Soft Glow Circle -->
  <circle cx="256" cy="220" r="140" fill="#ffffff" opacity="0.08"/>

  <!-- Location Pin (White) -->
  <path d="M256 140
           C200 140, 170 180, 170 230
           C170 300, 256 370, 256 370
           C256 370, 342 300, 342 230
           C342 180, 312 140, 256 140 Z"
        fill="#ffffff"/>

  <!-- Inner Circle -->
  <circle cx="256" cy="230" r="30" fill="#0ea5e9"/>

  <!-- Center Dot -->
  <circle cx="256" cy="230" r="12" fill="#ffffff"/>

</svg>